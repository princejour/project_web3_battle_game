name: Deploy ZIP Vite App to GitHub Pages

on:
  push:
    branches:
      - principal
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip project_web3_battle_game_github_pages_SLIM.zip -d extracted
          ls -la extracted

      - name: Find project root
        run: |
          find extracted -maxdepth 4 -name package.json
          echo "PROJECT_DIR=$(dirname $(find extracted -maxdepth 4 -name package.json | head -n 1))" >> $GITHUB_ENV

      - name: Show project dir
        run: |
          echo "$PROJECT_DIR"
          ls -la "$PROJECT_DIR"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: ${{ env.PROJECT_DIR }}

      - name: Build
        run: npm run build
        working-directory: ${{ env.PROJECT_DIR }}

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PROJECT_DIR }}/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

